<!doctype html>
<html lang="uk">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Odesa Theatre School</title>
		<meta name="description" content="A school where children always go with pleasure!" />
		<meta property="og:title" content="Odesa Theatre School" />
		<meta property="og:description" content="A school where children always go with pleasure!" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/" />
		<meta property="og:image" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta property="og:image:secure_url" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Odesa Theatre School" />
		<meta name="twitter:description" content="A school where children always go with pleasure!" />
		<meta name="twitter:image" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta name="theme-color" content="#1B5E7B" />
		<meta name="color-scheme" content="light dark" />
		<link rel="preconnect" href="https://firestore.googleapis.com" crossorigin />
		<script>
			try {
				var t = localStorage.getItem('teatralo4ka_theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.setAttribute('data-theme', 'dark');
					document.documentElement.classList.add('dark-theme');
					document.documentElement.classList.remove('light-theme', 'yellow-theme');
					document.querySelector('meta[name="color-scheme"]').content = 'dark';
				} else if (t === 'yellow') {
					document.documentElement.setAttribute('data-theme', 'yellow');
					document.documentElement.classList.add('yellow-theme');
					document.documentElement.classList.remove('dark-theme', 'light-theme');
					document.querySelector('meta[name="color-scheme"]').content = 'light';
				} else {
					document.documentElement.setAttribute('data-theme', 'light');
					document.documentElement.classList.add('light-theme');
					document.documentElement.classList.remove('dark-theme', 'yellow-theme');
					document.querySelector('meta[name="color-scheme"]').content = 'light dark';
				}
				var p = window.location.pathname;
				var base = '/teatralo4ka.odesa.ua';
				if (p === base + '/' || p === base || p === '/') {
					document.body.classList.add('page-home');
				}
			} catch (e) {}
		</script>
		<script>
			window.__perfLog = [];
			window.__perfT0 = performance.now();
			window.__perf = function(label) {
				var entry = { t: Math.round(performance.now() - window.__perfT0), label: label };
				window.__perfLog.push(entry);
			};
			window.__perf('inline-head: script parsed');
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div id="app-splash" aria-hidden="true">
			<div id="app-splash-logo-container">
				<img
					src="%sveltekit.assets%/logo/svg/t4_logo_IndividualParticles_MaskRed_2026.svg"
					alt=""
					id="app-splash-logo-red"
					class="splash-svg"
				/>
				<img
					src="%sveltekit.assets%/logo/svg/t4_logo_IndividualParticles_MaskBlue_2026.svg"
					alt=""
					id="app-splash-logo-blue"
					class="splash-svg"
				/>
			</div>

			<div id="app-splash-messages">
				<div id="app-splash-slow" class="sp-msg">
					<p id="sp-slow-text"></p>
				</div>
				<div id="app-splash-facts" class="sp-msg sp-facts">
					<p id="sp-facts-intro" class="sp-facts-intro"></p>
					<div id="sp-facts-rotator" class="sp-facts-rotator">
						<!-- Facts will be inserted here by script -->
					</div>
				</div>
			</div>
		</div>

		<style>
			#app-splash {
				position: fixed; inset: 0; z-index: 10000;
				background: #ffed00 !important;
				display: flex; flex-direction: column;
				align-items: center; justify-content: center;
				font-family: system-ui, -apple-system, sans-serif;
			}
			#app-splash-logo-container {
				position: relative;
				width: min(400px, 60vw);
				aspect-ratio: 400 / 242;
				z-index: 2;
			}
			.splash-svg {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				opacity: 0;
				transform: scale(0.8);
			}

			#app-splash-messages {
				display: flex;
				flex-direction: column;
				align-items: center;
				width: 100%;
				min-height: 180px;
				margin-top: 2rem;
				z-index: 1;
				text-align: center;
			}
			.sp-msg { 
				opacity: 0;
				transform: translateY(10px);
				transition: opacity 0.8s ease-out, transform 0.8s ease-out;
				padding: 0 1.5rem; 
				max-width: 480px; 
				display: block;
				pointer-events: none;
			}
			.sp-msg.sp-show {
				opacity: 1;
				transform: translateY(0);
				pointer-events: auto;
			}
			#app-splash-slow { margin-bottom: 1rem; }
			.sp-msg p { color: #5a4a00; font-size: 0.95rem; line-height: 1.5; margin: 0; }
			.sp-facts-intro { font-weight: 600; margin-bottom: 0.75rem !important; font-size: 0.85rem !important; opacity: 0.7; }
			.sp-facts-rotator { position: relative; height: 60px; }
			.sp-fact { 
				display: none; 
				position: absolute; top: 0; left: 0; right: 0;
				font-size: 1.05rem !important; font-weight: 500;
				animation: sp-fade-in 0.8s ease-out forwards; 
			}
			.sp-fact.sp-fact-active { display: block; }

			#app-splash-logo-blue.sp-logo-animate {
				animation: sp-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards,
						   sp-pulse 2s ease-in-out infinite 0.8s;
			}
			#app-splash-logo-red.sp-logo-animate {
				animation: sp-appear 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards,
						   sp-pulse 2s ease-in-out infinite 0.9s;
			}

			/* ── EXIT SEQUENCE (Updated Timings) ─────────────────────────── */
			#app-splash.splash-exit {
				/* 4. Background moves down (Starts at 0.5s, no pause) */
				animation: sp-splash-down 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.5s forwards !important;
				pointer-events: none;
			}
			#app-splash.splash-exit #app-splash-messages {
				/* 1. Text vanishes smoothly (0.0s - 0.3s) */
				animation: sp-fade-out 0.3s ease-in-out forwards !important;
			}
			#app-splash.splash-exit #app-splash-logo-red {
				/* 2. Red zooms out (0.1s - 0.4s) */
				animation: sp-zoom-out 0.3s 0.1s cubic-bezier(0.4, 0, 0.2, 1) both !important;
			}
			#app-splash.splash-exit #app-splash-logo-blue {
				/* 3. Blue zooms out (0.2s - 0.5s) */
				animation: sp-zoom-out 0.3s 0.2s cubic-bezier(0.4, 0, 0.2, 1) both !important;
			}

			@keyframes sp-appear {
				0% { opacity: 0; transform: scale(0.8); }
				100% { opacity: 1; transform: scale(1); }
			}
			@keyframes sp-pulse {
				0%, 100% { transform: scale(1); opacity: 1; }
				50% { transform: scale(1.06); opacity: 0.85; }
			}
			@keyframes sp-fade-in {
				0% { opacity: 0; transform: translateY(8px); }
				100% { opacity: 1; transform: translateY(0); }
			}
			@keyframes sp-fade-out {
				from { opacity: 1; transform: translateY(0); }
				to { opacity: 0; transform: translateY(-15px); }
			}
			@keyframes sp-zoom-out {
				0% { opacity: 1; transform: scale(1); }
				100% { opacity: 0; transform: scale(0.5); }
			}
			@keyframes sp-splash-down {
				to { transform: translateY(100vh); }
			}
		</style>
		<script>
			(function() {
				window.__perf('inline-body: splash script start');
				try {
					if (localStorage.getItem('teatralo4ka_homeSettings')) {
						document.getElementById('app-splash').style.display = 'none';
						return;
					}
				} catch(e) {}

				var lang = (navigator.language || 'uk').split('-')[0] === 'en' ? 'en' : 'uk';
				var content = {
					uk: {
						slow: 'Нестабільне підключення до інтернету...',
						intro: 'А поки браузер шукає інтернет, розкажемо цікаві факти про школу',
						facts: [
							'Ми є в багатьох соц. мережах: Facebook, Instagram, Telegram, YouTube, TikTok',
							'Одеська театральна школа має чотири відділення: Театральне, Музичне, Художнє та Відділення естетичного виховання',
							'Наразі ми Одеська театральна школа, але раніше мали назви: Дитяча театральна школа та Мистецька театральна школа',
							'У нашої школи понад 500 випускників',
							'У нашої школи понад 200 учнів'
						]
					},
					en: {
						slow: 'Unstable internet connection...',
						intro: 'While the browser is searching for internet, let us tell you some interesting facts about our school',
						facts: [
							'We are on many social networks: Facebook, Instagram, Telegram, YouTube, TikTok',
							'Odesa Theatre School has four departments: Theater, Music, Art, and Aesthetic Education',
							'Currently we are Odesa Theatre School, but previously we were named: Children\'s Theater School and Art Theater School',
							'Our school has over 500 graduates',
							'Our school has over 200 students'
						]
					}
				};

				var c = content[lang];
				document.getElementById('sp-slow-text').textContent = c.slow;
				document.getElementById('sp-facts-intro').textContent = c.intro;
				var rotator = document.getElementById('sp-facts-rotator');
				c.facts.forEach(function(text, i) {
					var p = document.createElement('p');
					p.className = 'sp-fact';
					p.textContent = text;
					rotator.appendChild(p);
				});

				var blue = document.getElementById('app-splash-logo-blue');
				var red = document.getElementById('app-splash-logo-red');
				var slowEl = document.getElementById('app-splash-slow');
				var factsEl = document.getElementById('app-splash-facts');
				
				function startAnimations() {
					if (blue.classList.contains('sp-logo-animate')) return;
					blue.classList.add('sp-logo-animate');
					red.classList.add('sp-logo-animate');
				}

				var loadedCount = 0;
				function onSvgLoaded() {
					loadedCount++;
					if (loadedCount >= 2) startAnimations();
				}
				[blue, red].forEach(function(img) {
					if (img.complete && img.naturalWidth > 0) onSvgLoaded();
					else { img.addEventListener('load', onSvgLoaded); img.addEventListener('error', onSvgLoaded); }
				});

				// Messages Timings (relative to script start)
				setTimeout(function() {
					if (document.getElementById('app-splash')) slowEl.classList.add('sp-show');
				}, 3000);

				setTimeout(function() {
					var splash = document.getElementById('app-splash');
					if (!splash) return;
					factsEl.classList.add('sp-show');
					var facts = splash.querySelectorAll('.sp-fact');
					var factIndex = 0;
					if (facts.length > 0) {
						setTimeout(function() {
							if (!document.getElementById('app-splash')) return;
							facts[0].classList.add('sp-fact-active');
							setInterval(function() {
								facts[factIndex].classList.remove('sp-fact-active');
								factIndex = (factIndex + 1) % facts.length;
								facts[factIndex].classList.add('sp-fact-active');
							}, 4000);
						}, 1000);
					}
				}, 4000);
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
