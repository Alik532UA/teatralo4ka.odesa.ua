<!doctype html>
<html lang="uk">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Одеська театральна школа</title>
		<meta name="description" content="Ваш шлях до музичної майстерності" />
		<meta property="og:title" content="Одеська театральна школа" />
		<meta property="og:description" content="Ваш шлях до музичної майстерності" />
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/" />
		<meta property="og:image" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta property="og:image:secure_url" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Одеська театральна школа" />
		<meta name="twitter:description" content="Ваш шлях до музичної майстерності" />
		<meta name="twitter:image" content="https://alik532ua.github.io/teatralo4ka.odesa.ua/og/og-default-1200x630.jpg" />
		<meta name="theme-color" content="#1B5E7B" />
		<meta name="color-scheme" content="light dark" />
		<script>
			try {
				var t = localStorage.getItem('theme');
				if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
					document.documentElement.setAttribute('data-theme', 'dark');
					document.documentElement.classList.add('dark-theme');
					document.querySelector('meta[name="color-scheme"]').content = 'dark';
				} else {
					document.documentElement.setAttribute('data-theme', 'light');
					document.documentElement.classList.remove('dark-theme');
					document.querySelector('meta[name="color-scheme"]').content = 'light dark';
				}
				// Mark home page before JS hydration to avoid flash
				var p = window.location.pathname;
				var base = '/teatralo4ka.odesa.ua';
				if (p === base + '/' || p === base || p === '/') {
					document.body.classList.add('page-home');
				}
			} catch (e) {}
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
